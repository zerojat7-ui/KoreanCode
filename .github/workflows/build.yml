name: Kcode Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 소스 체크아웃
      uses: actions/checkout@v4

    - name: gcc 설치 확인
      run: gcc --version

    - name: C 생성기 빌드
      run: make gen

    - name: 바이트코드 VM 빌드
      run: make kvm

    - name: 렉서 테스트
      run: make test

    - name: 빌드 결과물 업로드
      uses: actions/upload-artifact@v4
      with:
        name: kcode-binaries
        path: |
          kcode_gen
          kbc
